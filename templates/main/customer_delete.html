{% extends 'base.html' %}
{% block title %}Delete Customer{% endblock %}
{% block content %}

<div class="text-center">
    <div>
        <h2>Are you sure you want to delete "{{ object }}" Customer?</h2>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'customer_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
